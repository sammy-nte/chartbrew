name: Integration & Performance Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      database:
        description: 'Database to test with'
        required: true
        default: 'both'
        type: choice
        options:
          - mysql
          - postgres
          - both

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  integration-tests:
    name: Integration Tests (${{ matrix.database }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        database: [mysql, postgres]
        exclude:
          - database: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.database == 'mysql') && 'postgres' || 'NONE' }}
          - database: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.database == 'postgres') && 'mysql' || 'NONE' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run integration tests
        run: cd server && npm run test:integration
        timeout-minutes: 20
        env:
          NODE_ENV: test
          CI: true
          CB_DB_DIALECT_DEV: ${{ matrix.database }}
          FORCE_CONTAINERS: 'true'
          PGSSLMODE: ${{ matrix.database == 'postgres' && 'disable' || '' }}
          PGSSL: ${{ matrix.database == 'postgres' && 'false' || '' }}
          TEST_TIMEOUT: '120000'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: server/coverage
          flags: integration-${{ matrix.database }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  container-health:
    name: Container Health Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Verify container startup and teardown (MySQL)
        run: cd server && npm run test:integration
        timeout-minutes: 15
        env:
          NODE_ENV: test
          CB_DB_DIALECT_DEV: mysql
          FORCE_CONTAINERS: 'true'

      - name: Check for leftover containers
        if: always()
        run: |
          echo "=== Running containers ==="
          docker ps -a
          echo "=== Docker disk usage ==="
          docker system df
          echo "=== Pruning stopped containers ==="
          docker container prune -f || true

