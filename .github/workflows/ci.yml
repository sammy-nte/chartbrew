name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci --ignore-scripts

      - name: Lint server
        run: cd server && npm run lint

      - name: Set up Node.js (client cache)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci --ignore-scripts

      - name: Lint client
        run: cd client && npm run lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit server dependencies
        run: cd server && npm audit --audit-level=high
        continue-on-error: true

      - name: Audit client dependencies
        run: cd client && npm audit --audit-level=high
        continue-on-error: true

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run unit tests
        run: cd server && npm run test:unit
        env:
          NODE_ENV: test

  test-integration:
    name: Integration Tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    strategy:
      fail-fast: false
      matrix:
        db: [mysql, postgres]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm ci

      - name: Run integration tests
        run: cd server && npm run test:integration
        timeout-minutes: 15
        env:
          NODE_ENV: test
          CB_DB_DIALECT_DEV: ${{ matrix.db }}
          FORCE_CONTAINERS: 'true'
          PGSSLMODE: disable
          PGSSL: 'false'

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run security tests
        run: cd server && npm run test:security
        timeout-minutes: 10
        env:
          NODE_ENV: test
          FORCE_CONTAINERS: 'true'

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run full test suite with coverage
        run: cd server && npm run test:coverage
        timeout-minutes: 20
        env:
          NODE_ENV: test
          CB_DB_DIALECT_DEV: mysql
          FORCE_CONTAINERS: 'true'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: server/coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
  build:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [test-integration, test-security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Prepare client settings
        run: cd client && npm run prepareSettings

      - name: Build client
        run: cd client && npm run build